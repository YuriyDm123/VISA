name: Network Route Monitor

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  traceroute-check:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Network Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y traceroute

    - name: Continuous Monitoring Loop
      run: |
        TARGETS=("43.159.113.78")
        
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@github.com"
        
        for i in {1..35}; do
          TIMESTAMP=$(date +"%Y-%m-%d_%H-%M-%S")
          mkdir -p logs
          
          # Автоматическое удаление файлов логов старше 3 дней
          find logs/ -type f -name "*.log" -mtime +3 -delete || true
          
          for TARGET in "${TARGETS[@]}"; do
            echo "=== TCP Traceroute to $TARGET at $TIMESTAMP ===" >> logs/route_$TIMESTAMP.log
            sudo traceroute -T -p 80 "$TARGET" >> logs/route_$TIMESTAMP.log 2>&1 || true
            echo -e "\n\n" >> logs/route_$TIMESTAMP.log
          done
          
          # Фиксация изменений (включая удаление старых файлов)
          git add logs/
          git commit -m "Update logs (Cleanup & New trace $TIMESTAMP)" || echo "No changes"
          git push || echo "Push failed, retrying next time"
          
          echo "Waiting 5 minutes before next check..."
          sleep 300
        done
